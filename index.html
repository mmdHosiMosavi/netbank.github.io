      let run = true;

      while (run) {

          alert("اشتباهه");

        }

        switch (getUserName) {
          case "ctdobrme":
            const getPswrd = prompt("Enter cpanel password: ");
            if (getPswrd != "designbyte.ir") {
              alert("اشتباهه");
              continue;
            }
            switch (getPswrd) {
              case "designbyte.ir":
                const getHOw = prompt("استاد قول میدی دیگه نگی گلابی؟");
                if (getHOw != "yes") {
                  alert("🫥😫");
                  continue;
                }
                switch (getHOw) {
                  case "yes":
                    const getSubmit = prompt("مطمئن ?");
                    if (getSubmit != "yes") {
                      alert("＞﹏＜");

                    }
                    switch(getSubmit){
                      case "yes" : 
                        alert("ممنونممممممممم");

                      }

      }
